spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_website_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true

logging:
  level:
    com.example.personalwebsite: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG